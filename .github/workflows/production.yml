name: Pipeline Production

on:
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Correr pruebas con cobertura
        run: |
          python -m pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=85

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Desplegar a Railway Production
        run: railway up --detach --service ${{ secrets.RAILWAY_SERVICE_ID_PROD }}
        env:
          RAILWAY_TOKEN: "2629f1bc-0da1-469b-a0a7-ccceb311a7a3"
